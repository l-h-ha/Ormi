name: Build and Publish to PyPI

on:
  push:
    tags:
      - 'ormi-core-v*'

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2022]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install CUDA (Windows)
        if: runner.os == 'Windows'
        uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: '12.4.0'
          
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_PROJECT_REQUIRES_PYTHON: ">=3.10"
        with:
          package-dir: ormi-core

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build sdist
        run: pipx run build --sdist ormi-core

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: ormi-core/dist/*.tar.gz

  publish:
    name: Publish to Custom PyPI Index
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true

      - name: Generate Index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p pypi_server/whl/ormi-core
          
          echo "<!DOCTYPE html><html><body>" > pypi_server/whl/index.html
          echo "<a href=\"ormi-core/\">ormi-core</a>" >> pypi_server/whl/index.html
          echo "</body></html>" >> pypi_server/whl/index.html
          
          echo "<!DOCTYPE html><html><body>" > pypi_server/whl/ormi-core/index.html
          
          gh release list --repo ${{ github.repository }} --limit 100 | awk '{print $1}' | while read tag; do
            if [ -n "$tag" ]; then
              gh release view "$tag" --repo ${{ github.repository }} --json assets --jq '.assets[] | "<a href=\"" + .url + "\">" + .name + "</a><br>"' >> pypi_server/whl/ormi-core/index.html
            fi
          done
          
          echo "</body></html>" >> pypi_server/whl/ormi-core/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pypi_server

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4